50 }, clay: { wood: 50, clay: 50, iron: 50, crop: 50 }, iron: { wood: 100, clay: 80, iron: 30, crop: 60 }, crop: { wood: 60, clay: 60, iron: 60, crop: 50 } }, // Production per level (base production at level 0) productionPerLevel: { wood: 30, clay: 30, iron: 30, crop: 30 } }; // State tracking let t10xState = { overflowMonitor: false, queueAlarm: false, cropRadar: false, roiCalculator: false, protectionTracker: false, overflowInterval: null, roiInterval: null, lastNotificationTime: {} }; /** * Initialize the extension - checks storage and activates enabled features */ async function t10xInit() { // Load settings from storage (default to true if storage unavailable) let settings = { overflowMonitor: true, queueAlarm: true, cropRadar: true, roiCalculator: true, protectionTracker: true }; try { const stored = await chrome.storage.local.get([ 'overflowMonitor', 'queueAlarm', 'cropRadar', 'roiCalculator', 'protectionTracker' ]); if (stored) settings = { ...settings, ...stored }; } catch (e) {} t10xState.overflowMonitor = settings.overflowMonitor !== false; t10xState.queueAlarm = settings.queueAlarm !== false; t10xState.cropRadar = settings.cropRadar !== false; t10xState.roiCalculator = settings.roiCalculator !== false; t10xState.protectionTracker = settings.protectionTracker !== false; // Get current page const currentPage = window.location.pathname; const pageParams = new URLSearchParams(window.location.search); // Activate features based on page and settings if (t10xState.overflowMonitor) { initOverflowMonitor(); } if (t10xState.queueAlarm && (currentPage.includes('dorf1.php') || currentPage.includes('dorf2.php') || currentPage.includes('village1.php') || currentPage.includes('village2.php'))) { initQueueAlarm(); } if (t10xState.cropRadar && (currentPage.includes('karte.php') || currentPage.includes('map.php'))) { initCropRadar(); } if (t10xState.roiCalculator && currentPage.includes('village1.php')) { initROICalculator(); } if (t10xState.roiCalculator && currentPage.includes('build.php')) { initROICalculator(); } if (t10xState.protectionTracker && currentPage.includes('spieler.php')) { initProtectionTracker(); } } // ============================================================ // FEATURE 1: ZERO-WASTE OVERFLOW MONITOR // ============================================================ /** * Initialize the overflow monitor - runs continuously via setInterval */ function initOverflowMonitor() { // Create the main panel const panel = document.createElement('div'); panel.className = 't10x-container t10x-panel'; panel.id = 't10x-overflow-panel'; // Create resource indicators const resources = ['wood', 'clay', 'iron', 'crop']; resources.forEach(res => { const indicator = document.createElement('div'); indicator.className = `t10x-resource-indicator t10x-${res}`; indicator.dataset.resource = res; indicator.innerHTML = ` <div class=\"t10x-resource-icon t10x-${res}\"></div> <span class=\"t10x-resource-name\">${res.charAt(0).toUpperCase() + res.slice(1)}</span> <span class=\"t10x-percentage\">0%</span> `; panel.appendChild(indicator); }); document.body.appendChild(panel); // Start monitoring loop t10xState.overflowInterval = setInterval(updateOverflowMonitor, T10X_CONFIG.overflowCheckInterval); // Run immediately updateOverflowMonitor(); } /** * Update overflow monitor - reads values and updates UI */ function updateOverflowMonitor() { const resources = ['wood', 'clay', 'iron', 'crop']; const allTables = document.querySelectorAll('table'); let resourceTable = null; for (const table of allTables) { const count = (table.textContent.match(/[0-9]+\\//g) || []).length; if (count >= 5) { resourceTable = table; break; } } if (!resourceTable) return; const cells = resourceTable.querySelectorAll('td'); const resourceData = { wood: cells[1]?.textContent || '', clay: cells[3]?.textContent || '', iron: cells[5]?.textContent || '', crop: cells[7]?.textContent || '' }; resources.forEach(res => { const text = resourceData[res]; const match = text.match(/(\\d+)\\/(\\d+)/); if (!match) return; const current = parseInt(match[1], 10); const max = parseInt(match[2], 10); if (max === 0) return; const percentage = (current / max) * 100; const indicator = document.querySelector(`#t10x-overflow-panel .t10x-resource-indicator[data-resource=\"${res}\"]`); if (indicator) { const percentageSpan = indicator.querySelector('.t10x-percentage'); percentageSpan.textContent = Math.floor(percentage) + '%'; indicator.classList.remove('t10x-warning', 't10x-critical'); if (percentage >= T10X_CONFIG.overflowCriticalThreshold) { indicator.classList.add('t10x-critical'); } else if (percentage >= T10X_CONFIG.overflowWarningThreshold) { indicator.classList.add('t10x-warning'); } } }); } // ============================================================ // FEATURE 2: IDLE QUEUE ALARM // ============================================================ /** * Initialize the queue alarm - checks construction queue */ function initQueueAlarm() { // Create queue badge container in the overflow panel const panel = document.getElementById('t10x-overflow-panel'); const badge = document.createElement('div'); badge.id = 't10x-queue-badge'; badge.className = 't10x-queue-badge'; if (panel) { panel.appendChild(badge); } else { // Create standalone panel if overflow monitor is disabled const container = document.createElement('div'); container.className = 't10x-container t10x-panel'; container.appendChild(badge); document.body.appendChild(container); } // Check queue immediately and periodically updateQueueAlarm(); setInterval(updateQueueAlarm, 5000); } /** * Update queue alarm - checks if construction queue has items */ function updateQueueAlarm() { const badge = document.getElementById('t10x-queue-badge'); if (!badge) return; const allTables = document.querySelectorAll('table'); let queueTable = null; for (const table of allTables) { if (table.textContent.includes('Construction') || table.textContent.includes('Complete construction') || table.textContent.includes('Cancel') || table.textContent.includes('Main Building')) { queueTable = table; break; } } if (!queueTable) { badge.classList.add('t10x-idle'); badge.textContent = 'NO QUEUE'; return; } const rows = queueTable.querySelectorAll('tr'); const isEmpty = queueTable.textContent.toLowerCase().includes('empty') || rows.length <= 1; badge.classList.remove('t10x-active', 't10x-idle'); badge.textContent = ''; const existingWarning = document.getElementById('t10x-queue-idle-warning'); if (existingWarning) existingWarning.remove(); if (isEmpty) { badge.classList.add('t10x-idle'); badge.textContent = 'QUEUE EMPTY!'; const warning = document.createElement('div'); warning.id = 't10x-queue-idle-warning'; warning.className = 't10x-queue-badge t10x-idle'; warning.textContent = 'QUEUE IDLE - Build Something!'; document.body.appendChild(warning); } else { badge.classList.add('t10x-active'); badge.innerHTML = `✓ Active`; } } // ============================================================ // FEATURE 3: 15-CROPPER & OASIS RADAR // ============================================================ /** * Initialize the crop radar - adds scan button to map page */ function initCropRadar() { // Find a good place to add the scan button - UPDATE SELECTOR if needed const mapControls = document.querySelector('#karte .controls, #karte .toolbar, .map-controls'); const button = document.createElement('button'); button.className = 't10x-radar-button'; button.innerHTML = '🔍 Scan for Croppers'; button.addEventListener('click', scanMapForCroppers); if (mapControls) { mapControls.appendChild(button); } else { // Fallback: add to body button.style.position = 'fixed'; button.style.top = '10px'; button.style.right = '10px'; button.style.zIndex = '9999'; document.body.appendChild(button); } } /** * Scan the visible map for crop tiles */ function scanMapForCroppers() { // Find map tiles - UPDATE SELECTORS if needed const tiles = document.querySelectorAll('#map .tile, .map-container .tile, #karte .tile'); if (tiles.length === 0) { t10xShowRadarResults('No map tiles found. Make sure you are on the map page.', []); return; } const cropTiles = []; tiles.forEach(tile => { // Try to find coordinates - UPDATE SELECTOR if needed let x = 0, y = 0; const coordEl = tile.querySelector('.coord, .tile-coord'); if (coordEl) { const coordText = coordEl.textContent.match(/(\\-?\\d+)[,\\s]+(\\-?\\d+)/); if (coordText) { x = parseInt(coordText[1]); y = parseInt(coordText[2]); } } // Try to find tile type/oasis info - UPDATE SELECTOR if needed const tileType = tile.dataset.type || tile.className; const isOasis = tileType.includes('oasis') || tile.classList.contains('oasis'); // Check for crop bonus - look for crop indicators const cropText = tile.textContent; const has9Crop = cropText.includes('+9') || cropText.includes('9'); const has15Crop = cropText.includes('+15') || cropText.includes('15'); if ((has9Crop || has15Crop) && (isOasis || tileType.includes('3'))) { // Calculate distance from center (assume center is 0,0 or find it) const distance = Math.sqrt(x * x + y * y); cropTiles.push({ x: x, y: y, cropLevel: has15Crop ? 15 : 9, distance: Math.round(distance * 10) / 10, isOasis: isOasis }); } }); // Sort by crop level (15 first) then by distance cropTiles.sort((a, b) => { if (b.cropLevel !== a.cropLevel) return b.cropLevel - a.cropLevel; return a.distance - b.distance; }); if (cropTiles.length === 0) { t10xShowRadarResults('No 9-crop or 15-crop tiles found on current screen.', []); } else { t10xShowRadarResults(`Found ${cropTiles.length} crop/oasis tile(s):`, cropTiles); } } /** * Show radar results in a floating panel */ function t10xShowRadarResults(message, tiles) { // Remove existing results const existing = document.getElementById('t10x-radar-results'); if (existing) existing.remove(); const panel = document.createElement('div'); panel.id = 't10x-radar-results'; panel.className = 't10x-radar-results'; let html = ` <button class=\"t10x-radar-close\" onclick=\"document.getElementById('t10x-radar-results').remove()\">×</button> <h3>${message}</h3> `; if (tiles.length === 0) { html += '<p class=\"t10x-no-results\">Try panning the map to different areas.</p>'; } else { html += ` <table class=\"t10x-radar-table\"> <thead> <tr> <th>Coords</th> <th>Crop</th> <th>Distance</th> <th>Type</th> </tr> </thead> <tbody> `; tiles.forEach(tile => { const cropClass = tile.cropLevel === 15 ? 't10x-crop-15' : 't10x-crop-9'; html += ` <tr> <td>${tile.x}, ${tile.y}</td> <td class=\"${cropClass}\">+${tile.cropLevel}</td> <td>${tile.distance}</td> <td>${tile.isOasis ? 'Oasis' : 'Tile'}</td> </tr> `; }); html += '</tbody></table>'; } panel.innerHTML = html; document.body.appendChild(panel); } // ============================================================ // FEATURE 4: RAPID ROI CALCULATOR // ============================================================ /** * Initialize the ROI calculator - analyzes resource fields */ function initROICalculator() { calculateROI(); if (t10xState.roiInterval) clearInterval(t10xState.roiInterval); t10xState.roiInterval = setInterval(calculateROI, 20000); } /** * Calculate ROI for all resource fields */ function calculateROI() { const wrapper = document.querySelector('.wrapper'); if (!wrapper) return; const images = wrapper.querySelectorAll('img[alt]'); const typeMap = { 'Woodcutter': 'wood', 'Clay Pit': 'clay', 'Iron Mine': 'iron', 'Cropland': 'crop' }; const fieldLevels = { wood: [], clay: [], iron: [], crop: [] }; images.forEach(img => { const alt = img.alt; const match = alt?.match(/(Woodcutter|Clay Pit|Iron Mine|Cropland)\\s+level\\s+(\\d+)/i); if (!match) return; const fieldType = typeMap[match[1]]; const level = parseInt(match[2], 10); if (!fieldType) return; fieldLevels[fieldType].push(level); }); const costMatch = wrapper.textContent.match(/Costs\\s+to upgrade to level (\\d+):(\\d+)\\s*\\|(\\d+)\\s*\\|(\\d+)\\s*\\|(\\d+)/); if (costMatch) { const h1 = wrapper.querySelector('h1'); const fieldName = h1?.textContent?.match(/(Woodcutter|Clay Pit|Iron Mine|Cropland)/i)?.[1]; const typeMap = { 'Woodcutter': 'wood', 'Clay Pit': 'clay', 'Iron Mine': 'iron', 'Cropland': 'crop' }; const fieldType = typeMap[fieldName]; if (fieldType) { const nextLevel = parseInt(costMatch[1]); const costs = { wood: parseInt(costMatch[2]), clay: parseInt(costMatch[3]), iron: parseInt(costMatch[4]), crop: parseInt(costMatch[5]) }; const totalCost = costs.wood + costs.clay + costs.iron + costs.crop; const production = T10X_CONFIG.productionPerLevel[fieldType]; const roi = totalCost > 0 ? production / totalCost : 0; const typeName = fieldType.charAt(0).toUpperCase() + fieldType.slice(1); updateROIInPanel({ type: typeName, level: nextLevel, cost: totalCost }, roi); return; } } let bestROI = { type: null, value: 0 }; let bestField = { type: null, level: 0, cost: 0, production: 0 }; Object.keys(fieldLevels).forEach(fieldType => { const levels = fieldLevels[fieldType]; if (levels.length === 0) return; const currentLevel = Math.min(...levels); const baseCosts = T10X_CONFIG.fieldBaseCosts[fieldType]; const nextLevel = currentLevel + 1; const multiplier = Math.pow(T10X_CONFIG.costMultiplier, nextLevel); const costs = { wood: Math.floor(baseCosts.wood * multiplier), clay: Math.floor(baseCosts.clay * multiplier), iron: Math.floor(baseCosts.iron * multiplier), crop: Math.floor(baseCosts.crop * multiplier) }; const totalCost = costs.wood + costs.clay + costs.iron + costs.crop; const production = T10X_CONFIG.productionPerLevel[fieldType]; const roi = totalCost > 0 ? production / totalCost : 0; if (roi > bestROI.value) { bestROI = { type: fieldType, value: roi }; bestField = { type: fieldType, level: nextLevel, cost: totalCost, production: production }; } }); const upgradeData = []; Object.keys(fieldLevels).forEach(fieldType => { const levels = fieldLevels[fieldType]; if (levels.length === 0) return; const currentLevel = Math.min(...levels); const nextLevel = currentLevel + 1; const baseCosts = T10X_CONFIG.fieldBaseCosts[fieldType]; const multip